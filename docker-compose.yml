services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: smart_city_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Barasat@100
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - python-api

  python-api:
    build: ./ml_service
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5500:5500"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
